name: daily-checkin

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      AUTO_CHECKIN_CONFIG_ACC1: ${{ secrets.AUTO_CHECKIN_CONFIG_ACC1 }}
      AUTO_CHECKIN_CONFIG_ACC2: ${{ secrets.AUTO_CHECKIN_CONFIG_ACC2 }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Run auto check-in
        run: |
          set -o pipefail
          pnpm checkin 2>&1 | tee checkin.log

      - name: Notify Telegram summary
        if: always() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        env:
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          REF_NAME: ${{ github.ref_name }}
          JOB_STATUS: ${{ job.status }}
        run: |
          status_icon="✅"
          status_text="success"
          if [ "${JOB_STATUS}" != "success" ]; then
            status_icon="❌"
            status_text="failed"
          fi

          if [ -f checkin.log ]; then
            summary="$(python -c "from pathlib import Path; text = Path('checkin.log').read_text(encoding='utf-8', errors='replace').splitlines(); selected = [line for line in text if line.startswith('Processed ') or line.startswith('success=') or line.startswith('[')]; print('\\n'.join(selected[-20:]) if selected else 'No check-in summary captured.')")"
          else
            summary="No check-in log found."
          fi

          message="${status_icon} auto-check-in ${status_text}%0ARepo: ${REPO}%0ABranch: ${REF_NAME}%0ARun: #${RUN_NUMBER}%0Ahttps://github.com/${REPO}/actions/runs/${RUN_ID}%0A%0A${summary}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${message}"
